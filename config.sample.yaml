# 网易云 cookie（需黑胶会员才能解析无损/Hi-Res；可用页面上的扫码登录自动获取并回写到本文件）
cookie: 'MUSIC_U=XXX;os=pc;appver=8.9.75;'

# 日志级别（DEBUG/INFO/WARNING/ERROR）
LEVEL: "INFO"

# 控制页面上“扫码登录”功能的密码
QR_PASSWORD: 9527

# 可选服务项（都有内置默认值，需要改再取消注释）：
#   web_host: '0.0.0.0'   # 监听地址
#   web_port: '5151'      # 监听端口
#   debug: false          # 调试模式（会启用 Werkzeug 热重载）
#   cors_origins: '*'      # CORS 允许来源

# 请求安全与限流
WebSecurity:
  API_KEY: '6868'                    # 非网页来源需带此 key（X-API-Key 头或 ?api_key=）
  RATE_LIMIT: '200/hour'             # 每 IP 默认限流
  RATE_LIMIT_STORAGE: 'memory://'    # 限流计数存储；单进程用 memory:// 即可，多 worker/多副本才需 redis://host:6379
  # 信任的 IP 白名单（白名单内 IP 免来源校验直接放行）
  # 注意：Docker 桥接网络下 Flask 看到的往往是网关或反代 IP，未必落在下面网段；同源请求已自动放行，此白名单一般无需依赖。
  IP_WHITELIST: ["127.0.0.1", "192.168.1.0/24"]
  PUBLIC_ENDPOINTS: ["/health", "/"]  # 公开接口（无需来源校验）
  # 额外放行的来源（同源请求已自动放行，此处仅用于放行其它域名，如前置反代/CDN 域名）
  ALLOWED_ORIGINS: "http://localhost:5151"
